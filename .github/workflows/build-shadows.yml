name: Build Nexus Shadows

on:
  push:
    branches: [ "mod-nexus-shadows" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-shadows-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}

      - name: Build nexus-shadows
        run: ./gradlew :nexus-shadows:build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: nexus-shadows-${{ github.sha }}
          path: nexus-shadows/build/libs/*.jar