name: Build nexus-shadows
on:
  push:
    branches: [ mod-nexus-shadows ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :nexus-shadows:build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-shadows
          path: nexus-shadows/build/libs/*.jar
          if-no-files-found: error
