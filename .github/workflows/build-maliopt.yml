name: Build MaliOpt Module
on:
  push:
    paths:
      - 'nexus-maliopt/**'
      - 'src/main/resources/natives/arm64-v8a/libnexus_mali_core.so'

jobs:
  build-maliopt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - run: chmod +x ./gradlew
      - run: ./gradlew :nexus-maliopt:build
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-maliopt
          path: nexus-maliopt/build/libs/
