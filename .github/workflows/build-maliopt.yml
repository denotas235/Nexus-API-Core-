name: Build MaliOpt Module

on:
  push:
    paths:
      - 'nexus-maliopt/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x ./gradlew
      - run: ./gradlew :nexus-maliopt:build
      - name: Upload MaliOpt artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-maliopt
          path: nexus-maliopt/build/libs/nexus-maliopt-*.jar
