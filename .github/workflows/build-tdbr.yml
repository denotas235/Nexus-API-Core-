name: Build TDBR Module
on:
  push:
    paths:
      - 'nexus-tdbr/**'
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
  pull_request:
    paths:
      - 'nexus-tdbr/**'
      - 'src/**'

jobs:
  build-tdbr:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: make root gradlew executable
        run: chmod +x ./gradlew
      - name: clean maven local cache (forçar nova publicação)
        run: rm -rf ~/.m2/repository/com/nexuapicore
      - name: publish API Core to local Maven
        run: ./gradlew clean build publishToMavenLocal
      - name: make TDBR gradlew executable
        run: chmod +x nexus-tdbr/gradlew
      - name: build TDBR module
        run: cd nexus-tdbr && ./gradlew clean build --no-daemon
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-tdbr
          path: nexus-tdbr/build/libs/
