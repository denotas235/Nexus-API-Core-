name: Build TDBR Module
on: [pull_request, push]

jobs:
  build-tdbr:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: Make root gradlew executable
        run: chmod +x ./gradlew
      - name: Publish API Core to local Maven
        run: ./gradlew publishToMavenLocal
      - name: Make TDBR gradlew executable
        run: chmod +x nexus-tdbr/gradlew
      - name: Build TDBR module
        run: cd nexus-tdbr && ./gradlew build
      - name: Upload TDBR artifact
        uses: actions/upload-artifact@v7
        with:
          name: nexus-tdbr
          path: nexus-tdbr/build/libs/
