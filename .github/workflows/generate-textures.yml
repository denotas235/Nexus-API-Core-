name: Generate ASTC Textures

on:
  workflow_dispatch:
  push:
    branches: [ ASTC ]
    paths:
      - '.github/workflows/generate-textures.yml'
      - 'nexus-textures/src/main/java/com/nexus/textures/ASTCTextureCategory.java'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Minecraft JAR
        run: |
          ./gradlew :nexus-textures:build --no-daemon || true
          MINECRAFT_JAR=$(find ~/.gradle/caches/fabric-loom -name "minecraft-1.21.1-client.jar" | head -1)
          if [ -z "$MINECRAFT_JAR" ]; then
            echo "Minecraft JAR not found. Running gradle build again..."
            ./gradlew :nexus-textures:build --no-daemon
            MINECRAFT_JAR=$(find ~/.gradle/caches/fabric-loom -name "minecraft-1.21.1-client.jar" | head -1)
          fi
          cp "$MINECRAFT_JAR" ./minecraft.jar

      - name: Install astcenc
        run: |
          curl -L -o astcenc.zip https://github.com/ARM-software/astc-encoder/releases/download/5.4.0/astcenc-5.4.0-linux-x64.zip
          unzip -o astcenc.zip
          sudo cp bin/astcenc-sse4.1 /usr/local/bin/astcenc
          chmod +x /usr/local/bin/astcenc

      - name: Extract PNGs
        run: |
          mkdir -p textures_src
          unzip -q minecraft.jar "assets/minecraft/textures/**/*.png" -d textures_src/
          mv textures_src/assets/minecraft/textures textures_png

      - name: Convert to ASTC (category-aware)
        run: |
          python3 - << 'PYEOF'
          import os, subprocess, json, hashlib
          from pathlib import Path

          # Mapeamento de categoria para parâmetros
          CATEGORY_MAP = {
              "TERRAIN":    ("4x4", True,  False),  # ASTC 4x4 SRGB
              "ENTITY":     ("4x4", True,  False),
              "ITEM":       ("4x4", True,  False),
              "GUI":        ("4x4", True,  False),
              "BLOCK":      ("5x5", True,  False),  # ASTC 5x5 SRGB
              "PARTICLE":   ("8x8", True,  False),  # ASTC 8x8 SRGB
              "FLORA":      ("8x8", True,  False),
              "CLOUD":      ("10x10", True, False),  # ASTC 10x10 SRGB
              "SKYBOX":     ("12x12", True, False),  # ASTC 12x12 SRGB
              "NORMAL_MAP": ("4x4", False, False),   # ASTC 4x4 UNORM
              "EMISSIVE":   ("4x4", False, True),    # ASTC 4x4 HDR
              "DEFAULT":    ("4x4", True,  False),
          }

          def determine_category(path):
              p = str(path).lower()
              if "atlas" in p:                return "TERRAIN"
              if "textures/block" in p:       return "BLOCK"
              if "textures/entity" in p:      return "ENTITY"
              if "textures/item" in p:        return "ITEM"
              if "textures/gui" in p:         return "GUI"
              if "textures/particle" in p:    return "PARTICLE"
              if "textures/environment" in p: return "SKYBOX"
              if "textures/effect" in p:      return "EMISSIVE"
              if "normal" in p:               return "NORMAL_MAP"
              if "emissive" in p:             return "EMISSIVE"
              if "cloud" in p:                return "CLOUD"
              if "foliage" in p:              return "FLORA"
              if "grass" in p:                return "FLORA"
              if "leaves" in p:               return "FLORA"
              return "DEFAULT"

          src_dir = Path("textures_png")
          out_dir = Path("nexus-textures/src/main/resources/assets/maliopt/textures_astc")
          out_dir.mkdir(parents=True, exist_ok=True)
          manifest = {}

          for png in sorted(src_dir.rglob("*.png")):
              rel = png.relative_to(src_dir)
              cat = determine_category(rel)
              block_size, srgb, hdr = CATEGORY_MAP[cat]
              astc_path = out_dir / rel.with_suffix(".astc")
              astc_path.parent.mkdir(parents=True, exist_ok=True)

              cmd = ["astcenc", "-cl" if not srgb else "-cs", str(png), str(astc_path), block_size, "-fast"]
              if hdr:
                  cmd.insert(1, "-ch")
              subprocess.run(cmd, check=True)

              sha = hashlib.sha256(astc_path.read_bytes()).hexdigest()[:12]
              manifest[str(rel)] = {
                  "file": str(astc_path.relative_to(out_dir.parent)),
                  "sha256": sha,
                  "block": block_size,
                  "srgb": srgb,
                  "hdr": hdr
              }
              print(f"  {rel} -> {block_size} ({cat})")

          manifest_path = out_dir.parent / "astc_manifest.json"
          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)
          print(f"Manifesto salvo: {manifest_path} ({len(manifest)} texturas)")
          PYEOF

      - name: Commit generated textures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nexus-textures/src/main/resources/assets/maliopt/textures_astc/
          git add nexus-textures/src/main/resources/assets/maliopt/astc_manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "textures: regenerate ASTC with category-aware formats"
            git push
            echo "Textures committed successfully."
          fi
