name: Build API Core & MaliOpt

on: [push, pull_request]

jobs:
  build-api:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - run: chmod +x ./gradlew
      - run: ./gradlew build publishToMavenLocal
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-api-core
          path: build/libs/

  build-maliopt:
    needs: build-api
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - run: chmod +x ./gradlew
      - run: ./gradlew build publishToMavenLocal
      - run: ./gradlew :nexus-maliopt:build
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-maliopt
          path: nexus-maliopt/build/libs/
