name: Build nexus-render-hdr

on:
  push:
    branches: [mod-nexus-render-hdr]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build nexus-render-hdr JAR
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build nexus-render-hdr
        run: ./gradlew :nexus-render-hdr:build --no-daemon

      - name: Collect JAR
        run: |
          mkdir -p out
          cp nexus-render-hdr/build/libs/nexus-render-hdr-*.jar out/ 2>/dev/null || true
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-render-hdr-${{ github.sha }}
          path: out/*.jar
          if-no-files-found: warn

      - name: Attach JAR to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
