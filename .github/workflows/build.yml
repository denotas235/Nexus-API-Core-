name: Build nexus-render-hdr

on:
  push:
    branches: [ mod-nexus-render-hdr ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew :nexus-render-hdr:build --no-daemon
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: nexus-render-hdr
          path: nexus-render-hdr/build/libs/*.jar
          if-no-files-found: error
