name: Build API Core & MaliOpt

on:
  push:
    paths:
      - 'src/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '!nexus-maliopt/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x ./gradlew
      - run: ./gradlew build publishToMavenLocal
      - name: Upload Core artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-api-core
          path: build/libs/nexus-api-core-*.jar
