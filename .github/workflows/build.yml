name: Build Nexus Textures

on:
  push:
    branches: [ ASTC ]
  pull_request:
    branches: [ ASTC ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Baixa e instala astcenc ARM64 ─────────────────────────────────────
      - name: Download astcenc
        run: |
          curl -L https://github.com/ARM-software/astc-encoder/releases/download/5.4.0/astcenc-5.4.0-linux-arm64.zip \
            -o astcenc.zip
          unzip astcenc.zip -d astcenc_tmp
          mkdir -p nexus-textures/src/main/resources/natives/arm64-v8a
          find astcenc_tmp -name "astcenc*" -type f | head -1 | \
            xargs -I{} cp {} nexus-textures/src/main/resources/natives/arm64-v8a/libastcenc.so
          chmod +x nexus-textures/src/main/resources/natives/arm64-v8a/libastcenc.so
          echo "astcenc instalado"

      # ── Baixa minecraft.jar e pré-comprime texturas vanilla ───────────────
      - name: Pre-compress Vanilla Textures
        run: |
          MINECRAFT_VERSION="1.21.1"
          JAR_URL="https://piston-data.mojang.com/v1/objects/59353fb40c36d304f2035d51e7d6e6baa98dc05c/client.jar"

          echo "A baixar minecraft.jar..."
          curl -L "$JAR_URL" -o minecraft_client.jar

          echo "A extrair texturas PNG..."
          mkdir -p vanilla_textures
          unzip -q minecraft_client.jar "assets/minecraft/textures/*" -d vanilla_textures || true

          echo "A pré-comprimir para ASTC..."
          ASTCENC="nexus-textures/src/main/resources/natives/arm64-v8a/libastcenc.so"
          ASTCENC_BIN=$(find astcenc_tmp -name "astcenc*" -type f | head -1)
          chmod +x "$ASTCENC_BIN"

          mkdir -p nexus-textures/src/main/resources/assets/nexus-textures/astc_cache

          find vanilla_textures -name "*.png" | while read PNG; do
            REL="${PNG#vanilla_textures/}"
            OUT="nexus-textures/src/main/resources/assets/nexus-textures/astc_cache/${REL%.png}.astc"
            mkdir -p "$(dirname "$OUT")"

            # Escolhe formato por path
            if echo "$REL" | grep -qE "block|terrain|atlas"; then
              BLOCK="5x5"
            elif echo "$REL" | grep -qE "entity|item|gui"; then
              BLOCK="4x4"
            elif echo "$REL" | grep -qE "particle|foliage|grass|leaves"; then
              BLOCK="8x8"
            elif echo "$REL" | grep -qE "environment|sky"; then
              BLOCK="12x12"
            else
              BLOCK="4x4"
            fi

            "$ASTCENC_BIN" -cl "$PNG" "$OUT" "$BLOCK" -thorough 2>/dev/null || \
            "$ASTCENC_BIN" -cl "$PNG" "$OUT" "$BLOCK" -fast 2>/dev/null || \
            echo "SKIP: $PNG"
          done

          echo "Pré-compressão vanilla concluída"
          find nexus-textures/src/main/resources/assets/nexus-textures/astc_cache -name "*.astc" | wc -l

      # ── Build do mod ──────────────────────────────────────────────────────
      - name: Build
        run: |
          cd nexus-textures
          ../gradlew build --no-daemon --stacktrace

      # ── Upload JAR ────────────────────────────────────────────────────────
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: nexus-textures-${{ github.sha }}
          path: nexus-textures/build/libs/*.jar
          if-no-files-found: error
