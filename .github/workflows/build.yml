name: Build Nexus Ecosystem JARs

on:
  push:
    branches: [main, ASTC, mod-nexus-shadows, mod-nexus-render-hdr, "render/nefu-core"]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles("**/*.gradle*", "**/gradle-wrapper.properties") }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-mods-${{ github.ref_name }}-${{ github.sha }}
          path: |
            build/libs/*.jar
            */build/libs/*.jar
          if-no-files-found: warn

      - name: Attach JAR to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            */build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

