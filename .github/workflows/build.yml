name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: capture build artifacts (Nexus API Core)
        uses: actions/upload-artifact@v7
        with:
          name: nexus-api-core
          path: build/libs/
      - name: capture build artifacts (TDBR module)
        uses: actions/upload-artifact@v7
        with:
          name: nexus-tdbr
          path: nexus-modules/tdbr/build/libs/
