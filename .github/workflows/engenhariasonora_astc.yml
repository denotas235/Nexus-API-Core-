name: EngenhariaSonora ASTC Texture Pipeline

on:
  workflow_dispatch:
    inputs:
      quality:
        description: "Qualidade de compressão"
        required: true
        default: "medium"
        type: choice
        options:
          - fast
          - medium
          - thorough

jobs:
  convert-textures:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QUALITY: ${{ github.event.inputs.quality || 'medium' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install astcenc
        run: bash install_astcenc.sh

      - name: Download Minecraft JAR & Extract PNGs
        run: python3 download_minecraft_jar.py

      - name: Convert PNG → ASTC
        run: python3 convert_to_astc.py

      - name: Validate Manifest
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path
          manifest_path = Path("src/main/resources/assets/maliopt/astc_manifest.json")
          if not manifest_path.exists():
              print("Manifesto não encontrado")
              sys.exit(1)
          with open(manifest_path) as f:
              manifest = json.load(f)
          for k, v in manifest.items():
              if not Path("src/main/resources/" + v["astc"]).exists():
                  print(f"Faltando: {v['astc']}")
                  sys.exit(1)
          print(f"✓ {len(manifest)} texturas convertidas com sucesso")
          EOF

      - name: Commit ASTC textures
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/assets/maliopt/textures_astc/
          git add src/main/resources/assets/maliopt/astc_manifest.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança"
          else
            git commit -m "chore(astc): update ASTC textures [quality=${QUALITY}]"
            git push
          fi
