name: Build Nexus Streaming

on:
  push:
    branches: [ "perf/streaming" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-streaming-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}

      - name: Build nexus-streaming
        run: ./gradlew :nexus-streaming:build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: nexus-streaming-${{ github.sha }}
          path: nexus-streaming/build/libs/*.jar